<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>😊Pikku's Bookmark 😊| The First Website of my life.</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #f4f6f9;
      text-align: center;
      transition: 0.3s;
    }

    h1 {
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      padding: 15px;
      margin: 0;
    }

    .toggle-btn {
      margin: 15px;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .container {
      width: 90%;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      border-bottom: 2px solid #0072ff;
      padding-bottom: 5px;
    }

    a {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 80%;
      background: #0072ff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    a:hover {
      background: #00c6ff;
      transform: scale(1.05);
    }

    .dark {
      background: #121212;
      color: white;
    }

    .dark .card {
      background: #1e1e1e;
    }

    .dark a {
      background: #444;
    }

    .popup {
  position: fixed;
  top: -100%;
  left: 50%;
  transform: translateX(-50%) scale(0.8);
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
  transition: all 0.5s ease;
  z-index: 1000;
  width: 300px;
}

.popup.show {
  top: 25%;
  transform: translateX(-50%) scale(1);
}

.popup h2 {
  margin: 0;
}

.popup p {
  margin: 10px 0;
}

.popup button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  background: white;
  color: #0072ff;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.popup button:hover {
  background: #f1f1f1;
  transform: scale(1.1);
}

    .dark .popup {
  background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
  color: white;
}
.popup {
  backdrop-filter: blur(10px);
}
  body.blur {
  filter: blur(5px);
}  
  </style>
</head>

<body>

  <!-- Popup -->
  <div id="popup" class="popup">
  <span onclick="closePopup()" 
        style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:20px;">
        ❌
  </span>
  <h2>𝕎𝕖𝕝𝕔𝕠𝕞𝕖!</h2>
  <p>Welcome to <b>Pikku's First Website</b> 😎</p>
  <button onclick="closePopup()"> ℭ𝔬𝔫𝔱𝔦𝔫𝔲𝔢 </button>
</div>

  <h1>👉 My Bookmarks - ▓▒░𝐏𝐚𝐩𝐩𝐮 𝐤𝐮𝐦𝐚𝐫░▒▓ 👈</h1>

  <button class="toggle-btn" onclick="toggleDark()">🌙 Dark Mode</button>

  <div class="container">

    <div class="card">
      <h2>✔ Primary Bookmarks</h2>
      <a href="https://www.google.com" target="_blank">Open Google</a>
      <a href="https://www.facebook.com" target="_blank">Open Facebook</a>
      <a href="https://mail.google.com" target="_blank">Open Gmail</a>
      <a href="https://www.amazon.in" target="_blank">Open Amazon</a>
    </div>

    <div class="card">
      <h2>✔ Secondary Bookmarks</h2>
      <a href="https://jeemain.nta.nic.in/" target="_blank">Open JEE MAIN</a>
      <a href="https://open.spotify.com/" target="_blank">Open Spotify</a>
      <a href="https://cuet.nta.nic.in/" target="_blank">Open CUET</a>
      <a href="https://neet.nta.nic.in/" target="_blank">Open NEET UG</a>
    </div>

  </div>

  <script>
    function toggleDark() {
      document.body.classList.toggle("dark");
    }

    function closePopup() {
      document.getElementById("popup").classList.remove("show");
      document.body.classList.remove("blur"); //
    }

    window.onload = function() {
  setTimeout(() => {
    document.getElementById("popup").classList.add("show");
    document.body.classList.add("blur");
  }, 800);
};
  </script>

</body>
</html>
