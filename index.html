<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>😊Pikku's Bookmark 😊| The First Bookmark of my life. </title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #f4f6f9;
      text-align: center;
      transition: 0.3s;
    }

    h1 {
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      padding: 15px;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 600px;
      margin: 20px auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      border-bottom: 2px solid #0072ff;
      padding-bottom: 5px;
    }

    a {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 80%;
      background: #0072ff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: 0.3s;
    }

    a:hover {
      background: #00c6ff;
      transform: scale(1.05);
    }

    /* Dark Mode */
    .dark {
      background: #121212;
      color: white;
    }

    .dark .card {
      background: #1e1e1e;
    }

    .dark a {
      background: #444;
    }

    .toggle-btn {
      margin: 10px;
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background: black;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>👉 My Bookmarks - Pappu Kumar 👈</h1>

  <button class="toggle-btn" onclick="toggleDark()">🌙 Dark Mode</button>

  <div class="container">

    <div class="card">
      <h2>✔ Primary Bookmarks</h2>
      <a href="https://www.google.com" target="_blank">Open Google</a>
      <a href="https://www.facebook.com" target="_blank">Open Facebook</a>
      <a href="https://mail.google.com" target="_blank">Open Gmail</a>
      <a href="https://www.amazon.in" target="_blank">Open Amazon</a>
    </div>

    <div class="card">
      <h2>✔ Secondary Bookmarks</h2>
      <a href="https://jeemain.nta.nic.in/" target="_blank">Open JEE MAIN</a>
      <a href="https://open.spotify.com/" target="_blank">Open Spotify</a>
      <a href="https://cuet.nta.nic.in/" target="_blank">Open CUET</a>
      <a href="https://neet.nta.nic.in/" target="_blank">Open NEET UG</a>
    </div>

  </div>

  <script>
    function toggleDark() {
      document.body.classList.toggle("dark");
    }
  </script>
<script src="script.js"></script>
</body>
</html>
